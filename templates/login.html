<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso al Sistema</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        .camera-container {
            position: relative;
            width: 100%;
            max-height: 260px;
            overflow: hidden;
            border-radius: 8px;
        }

        /* Línea del Láser */
        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to bottom, rgba(0, 255, 0, 0), rgba(0, 255, 0, 0.8));
            box-shadow: 0px 0px 12px 3px rgba(0, 255, 0, 0.7);
            z-index: 10;
            display: none; 
        }

        @keyframes scanAnimation {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        /* Animación activa */
        .scanning .scanner-line {
            display: block;
            animation: scanAnimation 2s infinite linear;
        }

        .scanning::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 255, 0, 0.03);
            pointer-events: none;
            z-index: 9;
        }
    </style>
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-5 text-center" style="max-width:800px; border-radius:20px;">

        <h2 class="fw-bold mb-4">Sistema de Inventario</h2>

        {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
        {% endif %}

        <div class="row g-4">

            <div class="col-md-4">
                <div class="p-4 border rounded shadow-sm">
                    <i class="bi bi-shield-lock-fill text-primary fs-1"></i>
                    <h5 class="mt-3">Administrador</h5>

                    <button class="btn btn-primary w-100 mt-3"
                            onclick="mostrarFormulario('Administrador')">
                        Ingresar
                    </button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="p-4 border rounded shadow-sm">
                    <i class="bi bi-person-workspace text-success fs-1"></i>
                    <h5 class="mt-3">Usuario</h5>

                    <button class="btn btn-success w-100 mt-3"
                            onclick="mostrarFormulario('Usuario')">
                        Ingresar
                    </button>
                    
                    <button type="button" class="btn btn-outline-success w-100 mt-2" onclick="iniciarReconocimientoFacial()">
                        <i class="bi bi-camera-fill me-1"></i> Usar Rostro
                    </button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="p-4 border rounded shadow-sm">
                    <i class="bi bi-person-plus-fill text-warning fs-1"></i>
                    <h5 class="mt-3">Registrarse</h5>

                    <a href="/usuarios/registro/" class="btn btn-warning text-white w-100 mt-3">
                        Crear Cuenta
                    </a>
                </div>
            </div>

        </div>

        <div id="login-form" class="mt-5" style="display:none;">

            <hr>

            <h4 id="titulo-login"></h4>

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}

                <div class="mb-3">
                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Usuario"
                           required>
                </div>

                <div class="mb-3">
                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="Contraseña"
                           required>
                </div>

                <button type="submit" class="btn btn-dark w-100">
                    Iniciar sesión
                </button>

            </form>

        </div>

    </div>
</div>

<div class="modal fade" id="modalCamara" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-3" style="border-radius: 15px;">
            <h4 class="fw-bold mt-2">Escaneando Rostro</h4>
            <p class="text-muted small">Por favor, mire de frente a la cámara</p>
            
            <div id="cam-container" class="camera-container">
                <div class="scanner-line"></div>
                <video id="videoWebcam" autoplay playsinline class="w-100 rounded border bg-dark" style="transform: scaleX(-1); max-height: 260px; object-fit: cover;"></video>
            </div>
            
            <div class="mt-3 mb-2">
                <button type="button" class="btn btn-secondary px-4" onclick="apagarCamara()">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function mostrarFormulario(tipo){
    document.getElementById("login-form").style.display="block";
    document.getElementById("titulo-login").innerHTML = "Ingreso de " + tipo;
    document.getElementById("login-form").scrollIntoView({
        behavior:"smooth"
    });
}

// LÓGICA DE RECONOCIMIENTO FACIAL ROBUSTA (OPTIMIZADA)
let streamCamara = null;
let modalBootstrap = null;

function iniciarReconocimientoFacial() {
    const tituloModal = document.querySelector('#modalCamara h4');
    const subTituloModal = document.querySelector('#modalCamara p');
    const camContainer = document.getElementById('cam-container');
    
    if (tituloModal) {
        tituloModal.innerText = "Escaneando Rostro";
        tituloModal.className = "fw-bold mt-2 text-dark"; 
    }
    if (subTituloModal) {
        subTituloModal.innerText = "Por favor, mire de frente a la cámara";
    }

    modalBootstrap = new bootstrap.Modal(document.getElementById('modalCamara'));
    modalBootstrap.show();

    navigator.mediaDevices.getUserMedia({ video: { width: 400, height: 300 } })
        .then(function(stream) {
            streamCamara = stream;
            const video = document.getElementById('videoWebcam');
            video.srcObject = stream;
            
            // Iniciamos la animación láser
            camContainer.classList.add('scanning');
            
            // Esperamos 2.5 segundos de escaneo fluido antes de tomar la captura
            setTimeout(() => {
                if (!streamCamara) return;

                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Convertimos el canvas a un archivo Blob (binario real) para enviarlo al backend de Django
                canvas.toBlob((blob) => {
                    const formData = new FormData();
                    // Enviamos la imagen bajo el campo 'image' que busca la vista views.py
                    formData.append('image', blob, 'avatar.jpg');

                    // Enviar la foto al backend de Django
                    fetch("{% url 'login_facial' %}", {
                        method: "POST",
                        headers: {
                            "X-CSRFToken": "{{ csrf_token }}"
                        },
                        body: formData
                    })
                    .then(response => {
                        if (!response.ok) throw new Error("Error de respuesta del servidor");
                        return response.json();
                    })
                    .then(data => {
                        // Detenemos el láser y apagamos físicamente la cámara
                        camContainer.classList.remove('scanning');
                        apagarCamaraDispositivo();

                        if (data.success) {
                            if (tituloModal) {
                                tituloModal.innerText = "¡Rostro Verificado con Éxito!";
                                tituloModal.className = "fw-bold mt-2 text-success"; 
                            }
                            if (subTituloModal) {
                                subTituloModal.innerText = "Bienvenido, redirigiendo automáticamente...";
                            }

                            setTimeout(() => {
                                ocultarModalYLimpiar();
                                window.location.href = data.redirect_url || '/dashboard/';
                            }, 1500);

                        } else {
                            if (tituloModal) {
                                tituloModal.innerText = "Acceso Denegado";
                                tituloModal.className = "fw-bold mt-2 text-danger"; 
                            }
                            if (subTituloModal) {
                                subTituloModal.innerText = data.message;
                            }

                            setTimeout(() => {
                                ocultarModalYLimpiar();
                            }, 2500);
                        }
                    })
                    .catch(error => {
                        console.error(error);
                        camContainer.classList.remove('scanning');
                        apagarCamaraDispositivo();

                        if (tituloModal) {
                            tituloModal.innerText = "Error de Conexión";
                            tituloModal.className = "fw-bold mt-2 text-danger";
                        }
                        if (subTituloModal) {
                            subTituloModal.innerText = "No se pudo conectar con el servidor.";
                        }
                        setTimeout(() => {
                            ocultarModalYLimpiar();
                        }, 2500);
                    });
                }, 'image/jpeg', 0.9);

            }, 2500);
        })
        .catch(function(error) {
            console.error(error);
            alert("No se pudo iniciar la cámara. Revisa si otra pestaña la está utilizando o si tienes bloqueados los permisos.");
            ocultarModalYLimpiar();
        });
}

function apagarCamaraDispositivo() {
    if (streamCamara) {
        streamCamara.getTracks().forEach(track => track.stop());
        streamCamara = null;
    }
    const video = document.getElementById('videoWebcam');
    if (video) video.srcObject = null;
}

function apagarCamara() {
    apagarCamaraDispositivo();
    ocultarModalYLimpiar();
}

function ocultarModalYLimpiar() {
    if (modalBootstrap) {
        modalBootstrap.hide();
        const backdrop = document.querySelector('.modal-backdrop');
        if (backdrop) {
            backdrop.remove();
        }
        document.body.classList.remove('modal-open');
        document.body.style.overflow = '';
        document.body.style.paddingRight = '';
    }
}
</script>
</body>
</html>
