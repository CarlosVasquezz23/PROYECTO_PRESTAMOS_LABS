<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Administrador</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">

        <span class="navbar-brand">
            Sistema de Inventario
        </span>

        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="btn btn-danger">
                Cerrar sesión
            </button>
        </form>

    </div>
</nav>

<div class="container mt-5">

    <h2>Panel de Administrador</h2>

    <p class="text-muted">
        Usuario conectado: {{ user.username }}
    </p>

    <div class="row g-4">

        <!-- Equipos -->
        <div class="col-md-4">
            <div class="card shadow h-100 p-3 text-center">

                <h4>📦 Equipos</h4>

                <p class="text-muted">
                    Administrar inventario
                </p>

                <a href="{% url 'lista_equipos' %}" class="btn btn-primary">
                    Entrar
                </a>

            </div>
        </div>

        <!-- Categorías -->
        <div class="col-md-4">
            <div class="card shadow h-100 p-3 text-center">

                <h4>📁 Categorías</h4>

                <p class="text-muted">
                    Administrar categorías
                </p>

                <a href="{% url 'lista_categorias' %}" class="btn btn-success">
                    Entrar
                </a>

            </div>
        </div>

        <!-- Reporte -->
        <div class="col-md-4">
            <div class="card shadow h-100 p-3 text-center">

                <h4>📄 Reporte PDF</h4>

                <p class="text-muted">
                    Descargar reporte
                </p>

                <a href="{% url 'reporte_equipos_pdf' %}" class="btn btn-warning">
                    Descargar
                </a>

            </div>
        </div>

        <!-- Face ID -->
        <div class="col-md-4">
            <div class="card shadow h-100 p-3 text-center">

                <h4>
                    <i class="bi bi-person-bounding-box"></i>
                    Face ID
                </h4>

                <p class="text-muted">
                    Registrar rostro
                </p>

                <a href="{% url 'registrar_rostro' %}" class="btn btn-dark">
                    Configurar
                </a>

            </div>
        </div>

    </div>

</div>

</body>
</html>
