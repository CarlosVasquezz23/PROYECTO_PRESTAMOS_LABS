{% extends 'base.html' %}
{% block title %}Nueva Categoría{% endblock %}

{% block content %}
<div class="container-fluid mt-3 d-flex justify-content-center">
    <div class="card border-0 shadow-sm rounded-4 w-100" style="max-width: 600px;">
        <div class="card-header text-white rounded-top-4 py-3" style="background-color: #002D62;">
            <h5 class="mb-0 fw-bold"><i class="bi bi-tag-fill me-2"></i>Registrar Nueva Categoría</h5>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="nombre" class="form-label fw-semibold text-secondary">Nombre de la Categoría</label>
                    <input 
                        type="text" 
                        name="nombre" 
                        id="nombre" 
                        required 
                        class="form-control" 
                        placeholder="Ej. Equipos de Cómputo, Reactivos..."
                    >
                </div>
                
                <div class="mb-4">
                    <label for="descripcion" class="form-label fw-semibold text-secondary">Descripción (Opcional)</label>
                    <textarea 
                        name="descripcion" 
                        id="descripcion" 
                        rows="3" 
                        class="form-control" 
                        placeholder="Agrega una breve descripción sobre esta categoría..."
                    ></textarea>
                </div>
                
                <div class="d-flex justify-content-end gap-2">
                    <a href="{% url 'lista_categorias' %}" class="btn btn-light border shadow-sm px-4">Cancelar</a>
                    <button type="submit" class="btn text-white shadow-sm px-4" style="background-color: #F2A900; border: none;">
                        Guardar Categoría
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
